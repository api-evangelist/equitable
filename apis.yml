aid: equitable
name: Equitable
description: >-
  Equitable Holdings, Inc. is a financial services holding company offering
  individual retirement, group retirement, life insurance, and employee
  benefits solutions. In 2025, Equitable launched API capabilities for
  benefits plan setup integration, partnering with platforms such as Employee
  Navigator to streamline broker workflows.
