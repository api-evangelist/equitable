apis:
  - aid: equitable:benefits-plan-setup
    name: Equitable Benefits Plan Setup API
    description: >-
      An API capability that acts as a digital bridge between systems,
      enabling automatic creation and configuration of employee benefits plans
      for small and medium-sized businesses. Integrated with Employee Navigator
      to streamline group and product setup for brokers, allowing them to move
      from sale notification to enrollment readiness in hours. Available to
      brokers through Equitable's digital onboarding process; no public
      developer portal or self-service API documentation is currently
      available.
    humanURL: >-
